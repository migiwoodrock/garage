<!DOCTYPE html>
<html lang="ko" style="--ac: #cc0000;"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NFS GARAGE · 정비이력</title>
<link id="fav-icon" rel="icon" href="./icons/favicon.png">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#cc0000">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="GARAGE">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--ac:#cc0000;--ac2:#990000;}
.app{font-family:'Rajdhani',sans-serif;background:#080808;color:#eee;min-height:600px;}

.header{position:relative;height:86px;overflow:hidden;display:flex;align-items:center;padding:0 18px;border-bottom:2px solid var(--ac);}
.hbg{position:absolute;inset:0;background:var(--hbg,#110000);z-index:0;transition:background .4s;}
.hstripe{position:absolute;inset:0;z-index:1;background:repeating-linear-gradient(108deg,transparent,transparent 55px,rgba(0,0,0,0.22) 55px,rgba(0,0,0,0.22) 57px);}
.hcontent{position:relative;z-index:2;display:flex;align-items:center;gap:14px;width:100%;}

.logo-wrap{width:58px;height:58px;flex-shrink:0;cursor:pointer;position:relative;}
.logo-wrap img{width:100%;height:100%;object-fit:contain;border-radius:50%;}
.logo-edit-hint{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:9px;color:#fff;font-family:'Orbitron',monospace;letter-spacing:1px;text-align:center;}
.logo-wrap:hover .logo-edit-hint{opacity:1;}

.htext{flex:1;min-width:0;}
.hbike{font-family:'Orbitron',monospace;font-size:21px;font-weight:800;color:#fff;letter-spacing:2px;line-height:1;}
.hsub{font-size:11.5px;color:rgba(255,255,255,0.6);letter-spacing:2px;font-family:'Orbitron',monospace;margin-top:3px;}
.hnote{font-size:10.5px;color:rgba(255,200,0,0.7);font-family:'Orbitron',monospace;margin-top:2px;letter-spacing:1px;}

.nickname-area{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.nick-display{font-family:'Orbitron',monospace;font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:2px;cursor:pointer;border:1px solid transparent;padding:4px 8px;border-radius:2px;transition:border-color .2s;}
.nick-display:hover{border-color:rgba(255,255,255,0.2);}
.nick-input{background:rgba(255,255,255,0.08);border:1px solid var(--ac);border-radius:2px;color:#fff;font-family:'Orbitron',monospace;font-size:11px;padding:4px 8px;outline:none;width:140px;letter-spacing:1px;}
.nick-save{background:var(--ac);color:#fff;border:none;border-radius:2px;padding:4px 10px;font-family:'Orbitron',monospace;font-size:9px;font-weight:600;letter-spacing:1px;cursor:pointer;}

.bike-img-area{width:180px;height:70px;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:flex-end;}
.bike-img-wrap{width:175px;height:65px;position:relative;cursor:pointer;}
.bike-img-wrap img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 6px rgba(0,0,0,0.8));}
.bike-img-placeholder{width:100%;height:100%;border:1px dashed rgba(255,255,255,0.12);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;}
.bike-img-placeholder span{font-size:9px;color:rgba(255,255,255,0.25);font-family:'Orbitron',monospace;letter-spacing:1px;}
.bike-img-del{position:absolute;top:2px;right:2px;background:rgba(180,20,0,0.8);color:#fff;border:none;border-radius:2px;padding:2px 6px;font-size:8px;font-family:'Orbitron',monospace;cursor:pointer;opacity:0;transition:opacity .2s;}
.bike-img-wrap:hover .bike-img-del{opacity:1;}

.tabs{display:flex;background:#0c0c0c;border-bottom:1px solid #1c1c1c;padding:0 14px;gap:2px;}
.tab{padding:10px 18px;cursor:pointer;font-family:'Orbitron',monospace;font-size:11.5px;font-weight:600;letter-spacing:1.5px;color:#5c5c5c;border:none;background:none;border-bottom:3px solid transparent;transition:all .2s;}
.tab.active{color:var(--ac);border-bottom-color:var(--ac);}
.tab:hover:not(.active){color:#666;}

.toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#0c0c0c;border-bottom:1px solid #161616;}
.color-label{font-family:'Orbitron',monospace;font-size:9.5px;color:#5a5a5a;letter-spacing:1px;white-space:nowrap;}
input[type=color]{width:28px;height:22px;border:1px solid #2a2a2a;border-radius:2px;background:#111;padding:1px;cursor:pointer;}
.sep{width:1px;height:18px;background:#1e1e1e;flex-shrink:0;}
.filter-wrap{display:flex;align-items:center;gap:5px;flex:1;flex-wrap:wrap;}
.filter-label{font-family:'Orbitron',monospace;font-size:9.5px;color:#5a5a5a;letter-spacing:1px;white-space:nowrap;}
.fbtn{background:transparent;color:#5c5c5c;border:1px solid #1e1e1e;border-radius:2px;padding:4px 9px;font-family:'Orbitron',monospace;font-size:10px;cursor:pointer;letter-spacing:1px;transition:all .15s;}
.fbtn.on{background:rgba(255,255,255,0.05);color:var(--ac);border-color:var(--ac);}
.fbtn:hover:not(.on){color:#666;border-color:#2e2e2e;}

.body{padding:12px 14px;background:#0a0a0a;}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px;}
.stat{background:#111;border:1px solid #1e1e1e;border-radius:3px;padding:8px 11px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac);}
.stat-lbl{font-family:'Orbitron',monospace;font-size:10px;color:#5e5e5e;letter-spacing:1px;margin-bottom:3px;}
.stat-val{font-family:'Orbitron',monospace;font-size:17px;font-weight:800;color:#fff;}
.stat-val.ac{color:var(--ac);}
.stat-val.gold{color:#f5a623;font-size:12px;}
.stat-val.sm{font-size:13px;}

.km-bar{display:flex;align-items:center;gap:8px;background:#111;border:1px solid #1e1e1e;border-radius:3px;padding:8px 12px;margin-bottom:10px;flex-wrap:wrap;}
.km-bar label{font-family:'Orbitron',monospace;font-size:10px;color:var(--ac);letter-spacing:1px;white-space:nowrap;}
.km-bar input[type=number]{background:#080808;border:1px solid #2a2a2a;border-radius:2px;color:#fff;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;padding:4px 9px;outline:none;width:150px;}
.km-bar input[type=number]:focus{border-color:var(--ac);}
.btn-ac{background:var(--ac);color:#fff;border:none;border-radius:2px;padding:5px 12px;font-family:'Orbitron',monospace;font-size:9.5px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:opacity .2s;}
.btn-ac:hover{opacity:.82;}
.btn-ghost{background:transparent;color:var(--ac);border:1px solid var(--ac);border-radius:2px;padding:4px 10px;font-family:'Orbitron',monospace;font-size:9.5px;font-weight:600;letter-spacing:1px;cursor:pointer;}
.btn-ghost:hover{background:rgba(255,255,255,0.04);}
.btn-danger{background:transparent;color:#b02020;border:1px solid #6a1010;border-radius:2px;padding:4px 10px;font-family:'Orbitron',monospace;font-size:9.5px;font-weight:600;letter-spacing:1px;cursor:pointer;}
.btn-danger:hover{background:rgba(180,20,0,0.08);}

.sec-lbl{font-family:'Orbitron',monospace;font-size:9.5px;color:#4e4e4e;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:8px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:#181818;}

.warn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:6px;margin-bottom:12px;}
.wcard{border-radius:3px;padding:8px 10px;border:1px solid;}
.wcard.red{background:rgba(180,20,0,0.07);border-color:#6a1000;}
.wcard.yellow{background:rgba(245,166,35,0.05);border-color:#6a4a00;}
.wcard.green{background:rgba(0,140,50,0.04);border-color:#0a3018;}
.wt{font-family:'Orbitron',monospace;font-size:10.5px;font-weight:600;letter-spacing:1px;margin-bottom:3px;}
.wcard.red .wt{color:#e03010;}
.wcard.yellow .wt{color:#f5a623;}
.wcard.green .wt{color:#00b040;}
.ws{font-size:12px;color:#6e6e6e;line-height:1.5;}
.ws span{color:#888;font-weight:600;}
.pbar{background:#151515;border-radius:1px;height:3px;margin-top:5px;overflow:hidden;}
.pfill{height:100%;border-radius:1px;transition:width .4s;}

.tbl-wrap{overflow-x:auto;border:1px solid #181818;border-radius:3px 3px 0 0;border-bottom:none;}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
th{background:#0d0d0d;color:#4e4e4e;font-family:'Orbitron',monospace;font-size:9.5px;letter-spacing:1px;padding:6px 7px;text-align:left;border-bottom:1px solid var(--ac);white-space:nowrap;overflow:hidden;}
td{padding:5px 7px;border-bottom:1px solid #131313;color:#aaa;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
tr:hover td{background:#0f0f0f;}
.td-km{color:var(--ac);font-family:'Orbitron',monospace;font-size:11px;font-weight:600;}
.td-price{color:#f5a623;font-family:'Orbitron',monospace;font-size:11px;font-weight:600;}
.td-issue{color:#e03010;font-size:11px;}
.td-trip{color:#505050;font-family:'Orbitron',monospace;font-size:10px;}
.badge-ow{display:inline-block;background:rgba(180,20,0,0.15);color:#e03010;border:1px solid #6a1000;border-radius:2px;font-size:8.5px;padding:1px 5px;font-family:'Orbitron',monospace;letter-spacing:0.5px;margin-left:3px;vertical-align:middle;}
.act-btns{display:flex;gap:3px;}
.btn-sm{background:transparent;color:#555;border:1px solid #1e1e1e;border-radius:2px;padding:3px 7px;font-size:9.5px;cursor:pointer;font-family:'Orbitron',monospace;transition:all .15s;}
.btn-sm:hover.edit{color:var(--ac);border-color:var(--ac);}
.btn-sm:hover.del{color:#b02020;border-color:#6a1010;}
.btn-sm.edit:hover{color:var(--ac);border-color:var(--ac);}
.btn-sm.del:hover{color:#b02020;border-color:#6a1010;}

.total-bar{display:flex;justify-content:flex-end;align-items:center;gap:10px;padding:8px 12px;background:#0d0d0d;border:1px solid #181818;border-top:1px solid var(--ac);border-radius:0 0 3px 3px;}
.total-lbl{font-family:'Orbitron',monospace;font-size:9.5px;color:#4e4e4e;letter-spacing:1px;}
.total-val{font-family:'Orbitron',monospace;font-size:15px;font-weight:800;color:#f5a623;}

.form-box{margin-top:10px;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:3px;padding:11px;}
.form-grid{display:grid;grid-template-columns:1fr 2fr 1fr 1fr 1fr;gap:5px;margin-bottom:6px;}
.form-grid input{background:#080808;border:1px solid #1e1e1e;border-radius:2px;color:#ccc;font-family:'Rajdhani',sans-serif;font-size:12px;padding:5px 7px;outline:none;width:100%;}
.form-grid input:focus{border-color:var(--ac);}
.form-row2{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.form-row2 input{background:#080808;border:1px solid #1e1e1e;border-radius:2px;color:#ccc;font-family:'Rajdhani',sans-serif;font-size:12px;padding:5px 7px;outline:none;}
.form-row2 input:focus{border-color:var(--ac);}

.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:#111;border:1px solid #2a2a2a;border-top:2px solid var(--ac);border-radius:4px;padding:18px;width:400px;max-width:96%;}
.modal-title{font-family:'Orbitron',monospace;font-size:11.5px;color:var(--ac);letter-spacing:1.5px;margin-bottom:12px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;}
.modal-grid input{background:#080808;border:1px solid #222;border-radius:2px;color:#ccc;font-family:'Rajdhani',sans-serif;font-size:12px;padding:5px 8px;outline:none;width:100%;}
.modal-grid input:focus{border-color:var(--ac);}
.modal-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:10px;}

.confirm-ov{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:flex;align-items:center;justify-content:center;}
.confirm-box{background:#111;border:1px solid #2a2a2a;border-top:2px solid #b02020;border-radius:4px;padding:18px;width:320px;text-align:center;}
.confirm-title{font-family:'Orbitron',monospace;font-size:10.5px;color:#b02020;letter-spacing:2px;margin-bottom:7px;}
.confirm-msg{font-size:12px;color:#777;margin-bottom:14px;line-height:1.5;}
.confirm-actions{display:flex;gap:7px;justify-content:center;}

.no-rows{padding:20px;text-align:center;font-family:'Orbitron',monospace;font-size:11px;color:#3c3c3c;letter-spacing:2px;}

.btn-save{background:linear-gradient(180deg,#00b04a,#007a32);color:#fff;border:1px solid #00d05a;border-radius:2px;padding:5px 14px;font-family:'Orbitron',monospace;font-size:9.5px;font-weight:600;letter-spacing:1px;cursor:pointer;box-shadow:0 0 8px rgba(0,200,80,0.35);transition:filter .2s;}
.btn-save:hover{filter:brightness(1.15);}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(40px);background:#0c0c0c;border:1px solid var(--ac);border-left:3px solid var(--ac);color:#fff;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:1px;padding:10px 18px;border-radius:3px;z-index:500;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:0 6px 24px rgba(0,0,0,0.6);max-width:90%;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

html,body{background:#080808;-webkit-text-size-adjust:100%;}
.app{max-width:1100px;margin:0 auto;}

@media (max-width:620px){
  .header{height:auto;min-height:78px;padding:10px 12px;}
  .hcontent{flex-wrap:wrap;gap:10px;}
  .htext{flex:1 1 auto;}
  .hbike{font-size:17px;letter-spacing:2px;}
  .nickname-area{order:3;flex:1 1 100%;}
  .nick-input{width:100%;}
  .bike-img-area{order:2;width:120px;height:48px;}
  .bike-img-wrap{width:118px;height:46px;}
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .km-bar input[type=number]{width:110px;}
  .modal,.modal-grid{width:100%;}
  .modal-grid{grid-template-columns:1fr;}
  .form-grid{grid-template-columns:1fr 1fr;}
  .tab{padding:9px 14px;font-size:10.5px;letter-spacing:1px;}
  .toolbar{flex-wrap:wrap;}
  .bike-img-del{opacity:1;}
}

function calcTrips(records,curKm){
  const sorted=[...records].sort((a,x)=>a.km-x.km);
  const res=[];
  const purchaseKm=sorted[0]?.km||0;
  const groups={};
  for(let i=0;i<sorted.length;i++){
    const r=sorted[i];
    const tripA=r.km-purchaseKm;
    let tripB=0;
    const key=categorize(r.work);
    if(groups[key]!==undefined){tripB=r.km-groups[key];}
    groups[key]=r.km;
    res.push({...r,tripA,tripB});
  }
  return res;
}

function categorize(work){
  if(/엔진오일|엔진 오일/.test(work))return '엔진오일';
  if(/타이어/.test(work))return '타이어';
  if(/브레이크|패드/.test(work))return '브레이크';
  if(/점화|플러그/.test(work))return '점화';
  if(/구동계|체인|벨트/.test(work))return '구동계';
  if(/전기|하네스|코일|인젝터|배터리/.test(work))return '전기';
  if(/냉각수|쿨란트/.test(work))return '냉각수';
  return '기타';
}

function filterCat(work){
  if(activeFilters.has('전체'))return true;
  return activeFilters.has(categorize(work));
}

function findLast(kws){
  let last=null;
  for(const r of b().records){for(const kw of kws){if(r.work.includes(kw)&&(!last||r.km>last.km))last=r;}}
  return last;
}

function renderWarnings(){
  const bike=b();const cur=bike.currentKm;
  let urgent=[],ok=[];
  for(const[,info]of Object.entries(CONS)){
    const last=findLast(info.kw);
    const lastKm=last?last.km:(bike.records[0]?.km||0);
    const nextKm=lastKm+info.interval;
    const diff=nextKm-cur;
    const used=cur-lastKm;
    const pct=Math.min(100,Math.round((used/info.interval)*100));
    const status=diff<=0?'red':diff<=500?'yellow':'green';
    const bc=status==='red'?'#cc2200':status==='yellow'?'#f5a623':'#1a6632';
    const diffStr=diff<=0?`<span style="color:#e03010">+${fkm(Math.abs(diff))} 초과</span>`:`<span>${fkm(diff)} 남음</span>`;
    const card=`<div class="wcard ${status}">
      <div class="wt">${info.label}</div>
      <div class="ws">마지막: <span>${fkm(lastKm)}</span></div>
      <div class="ws">예정: <span>${fkm(nextKm)}</span></div>
      <div class="ws">사용: <span>${fkm(used)}</span> · ${diffStr}</div>
      <div class="pbar"><div class="pfill" style="width:${pct}%;background:${bc}"></div></div>
    </div>`;
    if(status!=='green')urgent.push(card);else ok.push(card);
  }
  let h='';
  if(urgent.length)h+=`<div class="sec-lbl">정비 경고</div><div class="warn-grid">${urgent.join('')}</div>`;
  h+=`<div class="sec-lbl">소모품 현황</div><div class="warn-grid">${ok.join('')}</div>`;
  return h;
}

function toggleFilter(cat){
  if(cat==='전체'){activeFilters=new Set(['전체']);}
  else{
    activeFilters.delete('전체');
    if(activeFilters.has(cat))activeFilters.delete(cat);else activeFilters.add(cat);
    if(activeFilters.size===0)activeFilters.add('전체');
  }
  fullRender();
}

  b().records.push({id:nextId++,km,work,brand:document.getElementById('f-brand').value.trim(),type:document.getElementById('f-type').value.trim(),price:parseInt(document.getElementById('f-price').value)||0,issue:document.getElementById('f-issue').value.trim()});

function askDelete(id){

function askReset(){

function handleFile(file,isLogo){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    if(isLogo){b().logoDataUrl=e.target.result;}
    else{b().bikeImgUrl=e.target.result;}
    fullRender();
  };
  reader.readAsDataURL(file);
}

/* ---------- 상태 저장 / 불러오기 / 파일 내보내기 ---------- */
const STORE_KEY='nfs_garage_v1';

// ---------- 클라우드 동기화 (JSONBin) ----------
const SYNC={
  binId:'6a3dee12da38895dfe00b0cd',
  key:'$2a$10$aB4HlDFNUKhZcm0X7.9mU.6tUtLFbG/rgZV69vIzeMqe9EEGoh9/e',
  base:'https://api.jsonbin.io/v3/b'
};
let booting=true, stateTs=0, syncState='idle', syncTimer=null;

function currentStateObj(){ return {DATA,nextId,curBike,customFavicon,ts:(stateTs||Date.now()),v:1}; }
function saveLocal(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(currentStateObj())); }catch(e){} }
function applyState(p){
  if(p&&Array.isArray(p.DATA)){
    DATA=p.DATA;
    if(typeof p.nextId==='number') nextId=p.nextId;
    if(typeof p.curBike==='number'&&p.curBike<DATA.length) curBike=p.curBike;
    if(typeof p.customFavicon==='string') customFavicon=p.customFavicon;
  }
}
function localState(){ try{ const r=localStorage.getItem(STORE_KEY); if(r) return JSON.parse(r);}catch(e){} return null; }
function embeddedState(){ try{ const el=document.getElementById('__STATE__'); if(el){const t=(el.textContent||'').trim(); if(t&&t!=='null') return JSON.parse(t);} }catch(e){} return null; }

function syncLabel(){
  const m={idle:['☁ 동기화됨','#00b04a'],loading:['☁ 불러오는중','#999'],saving:['☁ 저장중','#f5a623'],error:['☁ 오류','#e03010'],offline:['☁ 오프라인','#999']};
  return m[syncState]||m.idle;
}
function setSync(s){ syncState=s; const el=document.getElementById('sync-status'); if(el){const a=syncLabel(); el.textContent=a[0]; el.style.color=a[1];} }

async function remoteRead(){
  const res=await fetch(SYNC.base+'/'+SYNC.binId+'/latest',{headers:{'X-Master-Key':SYNC.key,'X-Bin-Meta':'false'}});
  if(!res.ok) throw new Error('read '+res.status);
  const j=await res.json();
  return (j && j.record!==undefined) ? j.record : j;   // 메타 래퍼가 와도 안전하게 언랩
}
async function remoteWrite(obj){
  const res=await fetch(SYNC.base+'/'+SYNC.binId,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':SYNC.key,'X-Bin-Versioning':'false'},body:JSON.stringify(obj)});
  if(!res.ok) throw new Error('write '+res.status);
  return await res.json();
}

function autosave(){
  if(booting) return;            // 부팅 중엔 원격 덮어쓰기 방지
  stateTs=Date.now();
  saveLocal();
  scheduleRemoteSave();
}
function scheduleRemoteSave(){
  if(syncTimer) clearTimeout(syncTimer);
  setSync('saving');
  syncTimer=setTimeout(async function(){
    try{ await remoteWrite(currentStateObj()); setSync('idle'); }
    catch(e){ setSync(navigator.onLine===false?'offline':'error'); }
  },1200);
}

async function forceUpload(){
  stateTs=Date.now(); saveLocal(); setSync('saving');
  try{ await remoteWrite(currentStateObj()); setSync('idle'); showToast('☁ 이 기기 데이터를 클라우드에 올렸어요'); }
  catch(e){ setSync('error'); showToast('업로드 실패 — 인터넷/키 확인'); }
}
async function forcePull(){
  setSync('loading');
  try{
    const r=await remoteRead();
    if(r&&Array.isArray(r.DATA)){ applyState(r); stateTs=r.ts||Date.now(); saveLocal(); applyFavicon(); fullRender(); showToast('☁ 클라우드 데이터를 불러왔어요'); }
    else showToast('클라우드에 데이터가 아직 없어요');
    setSync('idle');
  }catch(e){ setSync('error'); showToast('불러오기 실패 — 인터넷/키 확인'); }
}

async function bootstrap(){
  booting=true;
  const emb=embeddedState(), loc=localState();
  let best=(loc&&emb)?(((loc.ts||0)>=(emb.ts||0))?loc:emb):(loc||emb);
  applyState(best); stateTs=best?(best.ts||0):0;
  applyFavicon(); fullRender();
  setSync('loading');
  try{
    const remote=await remoteRead();
    const ok=remote&&Array.isArray(remote.DATA);
    const bestTs=best?(best.ts||0):-1;
    if(ok&&(remote.ts||0)>bestTs){ applyState(remote); stateTs=remote.ts||Date.now(); saveLocal(); applyFavicon(); fullRender(); }
    else if(ok&&(remote.ts||0)<bestTs){ await remoteWrite(currentStateObj()); }
    else if(!ok&&best){ await remoteWrite(currentStateObj()); }
    setSync('idle');
  }catch(e){ setSync(navigator.onLine===false?'offline':'error'); }
  booting=false;
}

function showToast(msg){
  const t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._tmr);
  t._tmr=setTimeout(()=>t.classList.remove('show'),2600);
}

function buildExportHTML(){
  const state={DATA,nextId,curBike,customFavicon,ts:Date.now(),v:1};
  const json=JSON.stringify(state).replace(/</g,'\\u003c');
  const clone=document.documentElement.cloneNode(true);
  const appEl=clone.querySelector('#app'); if(appEl) appEl.innerHTML='';
  const toastEl=clone.querySelector('#toast'); if(toastEl){toastEl.className='toast';toastEl.textContent='';}
  const stEl=clone.querySelector('#__STATE__'); if(stEl) stEl.textContent=json;
  return '<!DOCTYPE html>\n'+clone.outerHTML;
}

async function exportHTML(){
  const html=buildExportHTML();
  const name=(b().name||'GARAGE').replace(/\s+/g,'')+'_정비이력.html';
  // Chrome/Edge 데스크탑: Ctrl+S 처럼 같은 파일에 바로 덮어쓰기
  if(window.showSaveFilePicker){
    try{
      if(!fileHandle){
        fileHandle=await window.showSaveFilePicker({suggestedName:name,types:[{description:'HTML 파일',accept:{'text/html':['.html']}}]});
      }
      const w=await fileHandle.createWritable();
      await w.write(html);
      await w.close();
      showToast('저장 완료 · '+(fileHandle.name||name));
      return;
    }catch(err){
      if(err&&err.name==='AbortError') return; // 사용자가 취소
      fileHandle=null; // 권한 문제 등 → 폴백
    }
  }
  // iOS/Safari 등: 공유시트 / 다운로드
  legacyDownload(html,name);
}

function applyFavicon(){
  let l=document.getElementById('fav-icon');
  if(!l){l=document.createElement('link');l.id='fav-icon';l.rel='icon';document.head.appendChild(l);}
  l.href=customFavicon||DEFAULT_FAVICON;
  let t=document.getElementById('fav-touch');
  if(!t){t=document.createElement('link');t.id='fav-touch';t.rel='apple-touch-icon';document.head.appendChild(t);}
  t.href=customFavicon||DEFAULT_TOUCH;
}
function clickFaviconUpload(){document.getElementById('favicon-file').click();}
function resetFavicon(){customFavicon=null;applyFavicon();autosave();showToast('기본 아이콘으로 변경됨');}

function legacyDownload(content,filename){
  const blob=new Blob([content],{type:'text/html;charset=utf-8'});
  // iOS/Safari: 공유 시트로 "파일에 저장" 가능
  try{
    if(navigator.canShare){
      const file=new File([blob],filename,{type:'text/html'});
      if(navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:filename})
          .then(()=>showToast('저장 완료'))
          .catch(()=>{});
        return;
      }
    }
  }catch(e){}
  // 데스크탑/일반 브라우저: 다운로드
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1500);
  showToast('파일 저장됨 · '+filename);
}

document.getElementById('favicon-file').addEventListener('change',function(){
  if(this.files[0]){
    const r=new FileReader();
    r.onload=e=>{customFavicon=e.target.result;applyFavicon();autosave();showToast('아이콘 변경됨');};
    r.readAsDataURL(this.files[0]);
  }
  this.value='';
});
document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&(e.key==='s'||e.key==='S')){e.preventDefault();exportHTML();}
});

window.addEventListener('online', function(){ if(syncState==='offline'||syncState==='error') scheduleRemoteSave(); });
window.addEventListener('offline', function(){ setSync('offline'); });
bootstrap();
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./service-worker.js').catch(function(e){console.log('SW register fail',e);});
  });
}
